services:
  postgres:
    image: postgres:16-alpine
    container_name: deploy-history-postgres-local
    environment:
      POSTGRES_DB: deploy_history
      POSTGRES_USER: deploy_history
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deploy_history -d deploy_history"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: deploy-history-backend:local
    container_name: deploy-history-backend
    environment:
      SERVER_PORT: 8080
      APP_SECURITY_USERNAME: ${APP_SECURITY_USERNAME:-admin}
      APP_SECURITY_PASSWORD: ${APP_SECURITY_PASSWORD:?Set APP_SECURITY_PASSWORD}
      APP_SECURITY_JWT_ISSUER: deploy-history-backend
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/deploy_history}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-deploy_history}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: deploy-history-frontend:local
    container_name: deploy-history-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres-data:
